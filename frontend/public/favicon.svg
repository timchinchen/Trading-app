<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1340"/>
      <stop offset="55%" stop-color="#3b2a7a"/>
      <stop offset="100%" stop-color="#6b2d6b"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd6e2"/>
      <stop offset="55%" stop-color="#ff8ea8"/>
      <stop offset="100%" stop-color="#e66a8a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" stroke="#e66a8a" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="50%" y="54%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="48"
        fill="url(#fg)"
        filter="url(#glow)">$</text>
</svg>
